name: DevSecOps CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # Позволяет запускать проверку вручную из интерфейса GitHub

jobs:
  security-checks:
    runs-on: ubuntu-latest

    steps:
      # Шаг 0: Скачать наш код в виртуальную машину робота
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Важно для Gitleaks, чтобы видеть всю историю

      # Шаг 1: Установить Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Шаг 2: Установить зависимости из нашего файла
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8
          pip install -e .

      # Шаг 3: Запустить юнит-тесты
      - name: Run unit tests
        run: |
          pytest tests/ -v

      # Шаг 4: SAST - Статический анализ кода Bandit
      - name: Run Bandit SAST scan
        continue-on-error: true
        run: |
          bandit -r flaskr/ -ll -f json -o bandit-report.json
          bandit -r flaskr/ -ll # Вывод в консоль для отладки

      # Шаг 5: SCA - Анализ зависимостей Trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs' # Сканировать файловую систему
          scan-ref: '.' # Что сканировать (текущую папку)
          format: 'json' # Формат отчета
          output: 'trivy-report.json' # Имя файла отчета
          severity: 'CRITICAL,HIGH,MEDIUM' # Какие уровни уязвимостей искать

      # Шаг 6: Сканирование секретов Gitleaks
      - name: Run Gitleaks secret scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Токен для доступа к API GitHub

      # Шаг 7: Сохранить отчеты как артефакты (файлы, которые можно скачать)
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always() # Важно! Выполнять этот шаг всегда, даже если проверки упали с ошибкой
        with:
          name: security-reports
          path: |
            bandit-report.json
            trivy-report.json